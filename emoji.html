<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top: 100px;
    background-color: gray;
}

.emoji{
    height:200px;
    width:200px;
    background:linear-gradient(yellow,red);
    border-radius:50%;
    position:relative;
}

.eye1{
    height:45px;
    width:45px;
    background-color:black;
    border-radius:50%;
    position:absolute;
    top:45px;
    left:40px;
    transition:1s;
}

.eye1:hover{
    transform:scale(1.3);
}

.eye2{
    height:45px;
    width:45px;
    background-color:black;
    border-radius:50%;
    position:absolute;
    top:45px;
    right:40px;
    transition:1s;
}

.eye2:hover{
    transform:scale(1.3);
}

.pupil1{
    height:18px;
    width:18px;
    background-color:whitesmoke;
    border-radius:50%;
    position:absolute;
    top:14px;
    left:5px;
    animation-name:eye;
    animation-duration:1s;
    animation-iteration-count:infinite;
}

.pupil2{
    height:18px;
    width:18px;
    background-color:whitesmoke;
    border-radius:50%;
    position:absolute;
    top:14px;
    left:5px;
    animation-name:eye;
    animation-duration:1s;
    animation-iteration-count:infinite;
}

.mouth{
    height:20px;
    width:80px;
    background-color:orange;
    border-radius:0 0 50px 50px;
    position:absolute;
    top:130px;
    left:60px;
    transition:1s;
}

.mouth:hover{
    animation-name:mouth;
    animation-duration:0.5s;
    animation-iteration-count:infinite;
}

@keyframes eye{
    from{
        left:5px;
    }
    to{
        left:20px;
    }
}

@keyframes mouth{
    from{
        height:20px;
    }
    to{
        height:45px;
    }
}

</style>
</head>

<body>

<div class="emoji">

    <div class="eye1">
        <div class="pupil1"></div>
    </div>

    <div class="eye2">
        <div class="pupil2"></div>
    </div>

    <div class="mouth"></div>

</div>

</body>
</html>
