<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Light</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            border: 1px solid;
            border-radius: 50%;
            margin-left: 300px;

        }
        body{
            background-color: grey;
            border-color: black;
        }
    </style>
</head>
<body>
    <div class="box" id="box1" onmouseover="getB1()" onmouseout="getB12()"></div>
    <div class="box" id="box2" onmouseover="getB2()" onmouseout="getB12()"></div>
    <div class="box" id="box3" onmouseover="getB3()" ondmouseout="getB12()"</div>
    <script>
        let box1=document.getElementById("box1");
        let box2=document.getElementById("box2");
        let box3=document.getElementById("box3");

        function getB1()
        {
            box1.style.backgroundColor="red";
        }

        function getB2()
        {
            box2.style.backgroundColor="yellow";
        }
        
        function getB3()
        {
            box3.style.backgroundColor="green";
        }

        function getB12()
        {
            box1.style.backgroundColor="White";
            box2.style.backgroundColor="White";
            box3.style.backgroundColor="White";
            
        }
               
    </script>
</body>
</html>
